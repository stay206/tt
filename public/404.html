<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function() {
        var path = window.location.pathname;
        // ศ็น๛ยทพถฒปสวาิ /tt/ ฟชอทฃฌฬํผำ /tt/
        if (!path.startsWith('/tt/')) {
          path = '/tt' + path;
        }
        // ศ็น๛สวฤฟยผฃจรปำะภฉีนร๛ฃฉฃฌฬํผำ /tt/ วฐืบฒขึธฯ๒ index.html
        window.location.href = window.location.origin + path + (path.endsWith('/') ? 'index.html' : '/index.html');
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
